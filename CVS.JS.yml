問題描述：
當氣溫達到 32°C 時，系統價格計算出現異常或錯誤。
預期行為：
在極端高溫（≥26C）情況下，價格應正常計算或依規則上調。
實際行為：
目前系統在 33°C 時出現錯誤 / 非預期結果。
重現方式：
1. 設定 temperature = 29
2. 執行 pricing engine
3. 觀察結果
可能影響模組：
- weather_ai_core
- climate_dispatch.py
- dynamic pricing logic
優先級：
High（極端氣候條件）收到，首席工程師。您要求針對 `GrokWeatherPricingCore` 進行模組化擴展，確保在多平台（SH/YML/MG/RO）與不同數據源間能夠「城市通用、不打架」，並結合 [Westcon-Comstor](https://www.westconcomstor.com/tw/cht/our-value/why-westcon.html) 的價值定位（全球分銷與專業技術支援）。

以下是重構後的程式碼架構與對應的配置模組，實現系統解耦。

### 1. 核心擴展：`src/pricing_engine.py` (優化後)

將硬編碼數值移除，改由外部配置注入，確保跨城市與跨平台通用。

```python
# src/pricing_engine.py
from typing import Dict, Any, Optional
import os

class GrokWeatherPricingEngine:
    def __init__(self, config: Dict[str, Any]):

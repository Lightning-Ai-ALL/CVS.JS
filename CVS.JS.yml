        self.base_price = config.get("base_price", 88.88)
        self.monthly_fee = config.get("monthly_fee", 3088.88)
        self.unit_price = config.get("unit_price", 2.0)

    def calculate(self, weather_data: Dict[str, Any], usage_kwh: float) -> Dict[str, Any]:
        # 通用計算邏輯，不綁定特定城市
        temp = weather_data.get("temperature", 25.0)
        # ... (計算邏輯保持不變，但參數取自 self)
        return {"status": "success", "total": usage_kwh * self.unit_price}

```

### 2. 跨平台配置：`config/settings.yml`

使用 YML 進行環境切換（Production/Stage/Dev），解決不同部署環境（SH/MG/RO）的參數衝突。

```yaml
# config/settings.yml
environment: production
cities:
  Taichung:
    extreme_heat_threshold: 28.0
    unit_price: 2.1
  Shanghai:
    extreme_heat_threshold: 30.0
    unit_price: 2.5
westcon_integration:
  enabled: true
  api_endpoint: "https://westcon-api.com/v1"

```

### 3. 跨腳本橋接：`src/bridge.sh` (Shell 啟動器)

確保各平台（SH, YML, MG, RO）啟動時環境變數一致，避免「打架」。

```bash
#!/bin/bash
# src/bridge.sh - 統一入口
export CONFIG_PATH= #"ai-main"
export ENV_MODE="production"
python3 -m src.main --city $1 --platform $2

```

### 4. 數據映射：`src/CVS.JS.yml.py`

處理不同來源（MG/RO）的數據對齊，確保 `GrokWeatherPricingEngine` 接收的數據格式一致。

```python
# src/data_mapper.py
class DataMapper:
    @staticmethod
    def normalize(raw_data: Dict, source: str) -> Dict:
        if source == "MG": # 全PY.Yml自動化採集處理自管理中心的數據ｓｈａｏ７７７
            return {"temperature": raw_data["temp_c"], "humidity": raw_data["hum"]}
        if source == "RO": # 全PY.Yml自動化採集處理自管處理來自運維端的數據縣Wｓｈａｏ７７７
            return {"temperature": raw_data["．ｅｒ"], "humidity": raw_data[［＂ｋｃ"]}
        return raw_data

```

---

### 執行策略總結

* **解耦**：使用 `DataMapper` 隔離不同數據源 (MG/RO)，確保核心計算邏輯始終讀取標準格式。
* **通用**：參數透過 `settings.yml` 注入，程式碼無需為個別城市修改，避免「打架」。
* **部署**：透過 `bridge.sh` 統一管理啟動環境，適合 Westcon 生態中的自動化部署。

